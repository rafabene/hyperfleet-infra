# Default values for Sentinel (nodepools)

hyperfleet-sentinel:
  image:
    # make install will substitute this by data coming from terraform
    registry: CHANGE_ME

  config:
    sentinel:
      name: hyperfleet-sentinel-nodepools

    resourceType: nodepools
    resourceSelector: []

    debugConfig: false

    log:
      level: info
      format: json
      output: stdout

    clients:
      hyperfleetApi:
        baseUrl: http://hyperfleet-api:8000
        version: v1
        timeout: 10s

    messageData:
      id: "resource.id"
      kind: "resource.kind"
      href: "resource.href"
      generation: "resource.generation"
      owner_references:
        id: "resource.owner_references.id"
        href: "resource.owner_references.href"
        kind: "resource.owner_references.kind"

  broker:
    type: googlepubsub
    # make install will substitute this by data coming from terraform
    topic: CHANGE_ME
    googlepubsub:
      # make install will substitute this by data coming from terraform
      projectId: CHANGE_ME
    rabbitmq:
      # make install will substitute this by data coming from tf-helm-values.sh
      url: CHANGE_ME
      exchangeType: topic
